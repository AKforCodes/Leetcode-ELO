name: Fetch LeetCode Topics Weekly

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual trigger from GitHub

jobs:
  fetch-topics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Refresh ratings.txt from zerotrac
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            https://raw.githubusercontent.com/zerotrac/leetcode_problem_rating/main/ratings.txt \
            -o ratings.txt
          wc -l ratings.txt

      - name: Fetch topics from LeetCode
        run: |
          node scripts/fetch_leetcode_topics.js --resume --delay=200
        timeout-minutes: 180

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f ratings.txt frontend/public/tags.json frontend/public/tags.state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh ratings + topics (auto)"
            git push
          fi
